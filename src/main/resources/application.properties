spring.application.name=helpdesk-backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/helpdesk_db
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Configuration ──
# Secret key para firmar los tokens (mínimo 32 caracteres para HS256)
jwt.secret=HelpDeskSecretKey2024ProyectoUniversitarioSeguro
# Tiempo de expiración del token: 24 horas en milisegundos
jwt.expiration=86400000