spring.application.name=helpdesk-backend

server.port=8080

# ── Zona horaria y formato de fechas (Jackson) ──
# Se serializan las fechas con la zona horaria de Perú para que el frontend
# las muestre correctamente (sin desfase). Se agrega el offset para que el
# navegador las interprete de forma absoluta y no como hora local ambigua.
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

spring.datasource.url=jdbc:mysql://localhost:3306/helpdesk_db
spring.datasource.username=root
spring.datasource.password=apolitopichi

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Subida de archivos ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/cierres

# ── JWT Configuration ──
# Secret key para firmar los tokens (mínimo 32 caracteres para HS256)
jwt.secret=HelpDeskSecretKey2024ProyectoUniversitarioSeguro
# Tiempo de expiración del token: 24 horas en milisegundos
jwt.expiration=86400000